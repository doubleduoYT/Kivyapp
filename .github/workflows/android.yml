name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform/android-sdk
            ~/.buildozer/android/platform/android-ndk-r28c
            ~/.buildozer/android/platform/apache-ant-1.9.4
            .buildozer/android/platform
          key: hgos2-pygame-android-v8-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            hgos2-pygame-android-v8-${{ runner.os }}-

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y python3-pip git zip unzip openjdk-17-jdk autoconf automake libtool pkg-config zlib1g-dev libffi-dev libssl-dev
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install cython==0.29.37 buildozer==1.6.0

      - name: Fix buildozer spec
        run: |
          if [ ! -f buildozer.spec ]; then buildozer init; fi
          python3 - <<'PY'
          from pathlib import Path

          p = Path("buildozer.spec")
          lines = p.read_text().splitlines()

          wanted = {
              "title": "HG OS 2",
              "package.name": "hgos2",
              "package.domain": "org.doubleduo",
              "source.include_exts": "py,png,jpg,jpeg,webp,json,mp3,wav,ogg,ttf,otf",
              "requirements": "hostpython3==3.11.9,python3==3.11.9,pygame==2.5.2",
              "android.api": "33",
              "android.minapi": "24",
              "android.archs": "arm64-v8a",
              "android.accept_sdk_license": "True",
              "orientation": "landscape",
              "fullscreen": "1",
          }

          out = []
          done = set()

          for line in lines:
              stripped = line.strip()
              key = None
              for k in wanted:
                  if stripped.startswith(k + " =") or stripped.startswith("# " + k + " ="):
                      key = k
                      break

              if key:
                  out.append(f"{key} = {wanted[key]}")
                  done.add(key)
              else:
                  out.append(line)

          for k, v in wanted.items():
              if k not in done:
                  out.append(f"{k} = {v}")

          p.write_text("\n".join(out) + "\n")
          PY

          grep -E "^(requirements|android.accept_sdk_license|android.api|android.minapi|android.archs|orientation|fullscreen)" buildozer.spec

      - name: Build APK
        run: |
          yes | buildozer -v android debug || (
            HP=$(find .buildozer/android/platform/build-arm64-v8a -path '*hostpython3/native-build/root/usr/local/bin/python' | head -1 || true)

            if [ -z "$HP" ]; then
              echo "hostpython was not created yet. Re-running buildozer with automatic license acceptance..."
              yes | buildozer -v android debug
              exit $?
            fi

            "$HP" -m ensurepip --upgrade || true
            "$HP" -m pip install cython==0.29.37 setuptools wheel
            yes | buildozer -v android debug
          )

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: HG_OS_2_APK
          path: |
            bin/*.apk
            .buildozer/android/platform/build-*/dists/*/build.log
